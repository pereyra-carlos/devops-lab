apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipecho-grafana
  namespace: devops-lab
  labels:
    app: ipecho-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ipecho-grafana
  template:
    metadata:
      labels:
        app: ipecho-grafana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          env:
            - name: GF_INSTALL_PLUGINS
              value: yesoreyeram-infinity-datasource
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: ipecho-grafana-admin
                  key: user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ipecho-grafana-admin
                  key: password
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashprovider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: ipecho-grafana-datasources
        - name: dashprovider
          configMap:
            name: ipecho-grafana-dashprovider
        - name: dashboards
          configMap:
            name: ipecho-grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: ipecho-grafana
  namespace: devops-lab
  labels:
    app: ipecho-grafana
spec:
  type: NodePort
  selector:
    app: ipecho-grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30898
