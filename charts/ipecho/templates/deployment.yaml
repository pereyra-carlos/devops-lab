apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ipecho.fullname" . }}
  labels:
    {{- include "ipecho.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ipecho.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ipecho.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ipecho.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.geoip.enabled }}
      initContainers:
        - name: geoip-download
          image: {{ .Values.geoip.image }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              wget -O /tmp/db.tar.gz "https://download.maxmind.com/app/geoip_download?edition_id={{ .Values.geoip.edition }}&license_key=$LICENSE_KEY&suffix=tar.gz"
              tar -xzf /tmp/db.tar.gz -C /tmp
              cp /tmp/{{ .Values.geoip.edition }}_*/{{ .Values.geoip.edition }}.mmdb {{ .Values.geoip.dbPath }}
          env:
            - name: LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.geoip.licenseSecret }}
                  key: license
          volumeMounts:
            - name: geoip
              mountPath: /data
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- if .Values.geoip.enabled }}
            - name: GEOIP_DB
              value: {{ .Values.geoip.dbPath | quote }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.securityContext.readOnlyRootFilesystem }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
            {{- if .Values.geoip.enabled }}
            - name: geoip
              mountPath: /data
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.securityContext.readOnlyRootFilesystem }}
        - name: tmp
          emptyDir: {}
        {{- end }}
        {{- if .Values.geoip.enabled }}
        - name: geoip
          emptyDir: {}
        {{- end }}
